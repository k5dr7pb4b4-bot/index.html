<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ម៉ាស៊ីនគិតប្រាក់ | KHR ↔ USD</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22; --card: #1c2230; --border: #2d3748;
      --gold: #e6b84a; --gold-dim: #a8822a; --teal: #38c9a0; --teal-dim: #1f7a60;
      --text: #e8eaf0; --muted: #8892a4; --danger: #e05252;
      --radius: 14px; --mono: 'DM Mono', monospace; --khmer: 'Hanuman', serif;
    }
    body {
      background: var(--bg); color: var(--text); font-family: var(--khmer);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 40px 16px 60px;
    }
    header { text-align: center; margin-bottom: 36px; }
    .flag-row { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 2rem; margin-bottom: 10px; }
    .flag-row span.arrow { color: var(--gold); font-size: 1.4rem; }
    h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }
    h1 em { color: var(--gold); font-style: normal; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 4px; font-family: var(--mono); }

    .rate-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 18px 22px; width: 100%; max-width: 480px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .rate-label { font-size: 0.8rem; color: var(--muted); font-family: var(--mono); line-height: 1.6; }
    .rate-label strong { display: block; color: var(--gold); font-size: 1.05rem; }
    .rate-input-wrap {
      display: flex; align-items: center; gap: 6px; background: var(--surface);
      border: 1.5px solid var(--gold-dim); border-radius: 8px; padding: 6px 12px; flex-shrink: 0;
    }
    .rate-input-wrap input {
      background: transparent; border: none; outline: none; font-family: var(--mono);
      font-size: 1.1rem; font-weight: 500; color: var(--gold); width: 80px; text-align: right;
    }
    .rate-input-wrap .unit { color: var(--muted); font-size: 0.8rem; font-family: var(--mono); }
    .rate-reset {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.75rem;
      font-family: var(--khmer); transition: 0.2s;
    }
    .rate-reset:hover { border-color: var(--gold); color: var(--gold); }

    .calc-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 480px; overflow: hidden; }
    .calc-block { padding: 22px 24px; }
    .calc-block + .calc-block { border-top: 1px solid var(--border); }
    .block-label {
      display: flex; align-items: center; gap: 8px; font-size: 0.75rem;
      font-family: var(--mono); color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 12px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-gold { background: var(--gold); }
    .dot-teal { background: var(--teal); }
    .input-row { display: flex; align-items: center; gap: 10px; }
    .currency-badge {
      font-size: 0.9rem; font-weight: 700; font-family: var(--mono); background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; flex-shrink: 0;
    }
    .badge-gold { color: var(--gold); border-color: var(--gold-dim); }
    .badge-teal { color: var(--teal); border-color: var(--teal-dim); }
    .amount-input {
      flex: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-family: var(--mono);
      font-size: 1.4rem; font-weight: 500; color: var(--text); outline: none;
      transition: border-color 0.2s; width: 100%;
    }
    .amount-input:focus { border-color: var(--gold); }
    .amount-input.teal:focus { border-color: var(--teal); }

    .swap-wrap { display: flex; align-items: center; justify-content: center; position: relative; gap: 60px; }
    .swap-wrap::before { content: ''; position: absolute; left: 0; right: 0; height: 1px; background: var(--border); }
    .swap-btn {
      position: relative; z-index: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 1.1rem; transition: 0.2s; color: var(--gold);
    }
    .swap-btn:hover { border-color: var(--gold); background: var(--card); transform: rotate(180deg); }
    .clear-fields-btn {
      position: relative; z-index: 1; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 1rem; transition: 0.2s; color: var(--muted);
      opacity: 0.4; pointer-events: none;
    }
    .clear-fields-btn.active { opacity: 1; pointer-events: auto; color: var(--danger); border-color: var(--danger); }
    .clear-fields-btn.active:hover { background: var(--danger); color: #fff; transform: rotate(90deg); }

    .result-bar {
      background: var(--surface); border-top: 1px solid var(--border); padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--mono); font-size: 0.8rem; color: var(--muted);
    }
    .result-bar .rate-info { color: var(--gold-dim); }

    /* ── Calculator section ── */
    .builtin-calc { border-top: 1px solid var(--border); padding: 16px 20px 20px; }

    .calc-label {
      font-size: 0.72rem; color: var(--muted); font-family: var(--mono);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
    }

    .calc-screen {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; margin-bottom: 12px; text-align: right; min-height: 66px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .calc-expr { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); min-height: 18px; word-break: break-all; }
    .calc-val  { font-family: var(--mono); font-size: 1.65rem; font-weight: 500; color: var(--text); word-break: break-all; }

    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    .ck {
      background: var(--surface); border: 1px solid var(--border); border-radius: 9px;
      padding: 15px 6px; font-size: 1.15rem; font-family: var(--mono); font-weight: 500;
      color: var(--text); cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.07s;
      text-align: center; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .ck:active { transform: scale(0.9); }
    .ck:hover  { background: var(--card); border-color: var(--gold-dim); }
    .ck.op { color: var(--gold); border-color: var(--gold-dim); }
    .ck.op:hover { background: #29200d; }
    .ck.ac { color: var(--danger); border-color: var(--danger); font-size: 0.95rem; }
    .ck.ac:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .ck.back { color: var(--muted); }
    .ck.back:hover { border-color: var(--danger); color: var(--danger); }
    .ck.eq {
      background: var(--gold); border-color: var(--gold); color: #1a1200;
      font-weight: 700; font-size: 1.4rem;
    }
    .ck.eq:hover { background: #f0c84e; }

    .send-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .send-btn {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 9px;
      padding: 10px 6px; font-family: var(--khmer); font-size: 0.82rem;
      cursor: pointer; transition: 0.18s; text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .send-btn.to-usd { color: var(--gold); border-color: var(--gold-dim); }
    .send-btn.to-usd:hover { background: #29200d; }
    .send-btn.to-khr { color: var(--teal); border-color: var(--teal-dim); }
    .send-btn.to-khr:hover { background: #0e2a20; }

    footer { margin-top: 32px; color: var(--muted); font-size: 0.75rem; font-family: var(--mono); text-align: center; }

    @media (max-width: 500px) {
      .amount-input { font-size: 1.1rem; padding: 10px 12px; }
      h1 { font-size: 1.3rem; }
      .ck { padding: 16px 4px; font-size: 1rem; }
      .calc-val { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="flag-row">🇰🇭 <span class="arrow">⇄</span> 🇺🇸</div>
  <h1>ម៉ាស៊ីនប្តូរ<em>រូបិយប័ណ្ណ</em></h1>
  <div class="subtitle">KHR (រៀល) ↔ USD (ដុល្លារ)</div>
</header>

<div class="rate-card">
  <div class="rate-label">
    <strong>អត្រាប្តូរប្រាក់</strong>
    1 USD = ? KHR (អ្នកអាចកែបាន)
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="rate-input-wrap">
      <input type="number" id="rateInput" value="4000" min="1" max="99999" step="1" />
      <span class="unit">៛</span>
    </div>
    <button class="rate-reset" onclick="resetRate()">លំនាំដើម</button>
  </div>
</div>

<div class="calc-card">

  <div class="calc-block">
    <div class="block-label"><span class="dot dot-gold"></span>ពី ដុល្លារ → រៀល</div>
    <div class="input-row">
      <span class="currency-badge badge-gold">USD $</span>
      <input class="amount-input" id="usdInput" type="number" min="0" placeholder="0.00" oninput="calcFromUSD()" />
    </div>
  </div>

  <div class="swap-wrap">
    <button class="clear-fields-btn" id="clearFieldsBtn" onclick="clearFields()" title="លុបចំនួន" style="visibility:hidden">✕</button>
    <button class="swap-btn" onclick="swapValues()">⇅</button>
    <button class="clear-fields-btn" id="clearFieldsBtn2" onclick="clearFields()" title="លុបចំនួន">✕</button>
  </div>

  <div class="calc-block">
    <div class="block-label"><span class="dot dot-teal"></span>ពី រៀល → ដុល្លារ</div>
    <div class="input-row">
      <span class="currency-badge badge-teal">KHR ៛</span>
      <input class="amount-input teal" id="khrInput" type="number" min="0" placeholder="0" oninput="calcFromKHR()" />
    </div>
  </div>

  <div class="result-bar">
    <span id="formula">បំពេញចំនួនខាងលើ</span>
    <span class="rate-info" id="rateDisplay">1$ = 4,000៛</span>
  </div>

  <!-- Calculator -->
  <div class="builtin-calc">
    <div class="calc-label">· CALCULATOR ·</div>
    <div class="calc-screen">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-val"  id="calcVal">0</div>
    </div>
    <div class="calc-grid">
      <button class="ck ac"   onclick="cAC()">AC</button>
      <button class="ck back" onclick="cBack()">⌫</button>
      <button class="ck op"   onclick="cOp('%')">%</button>
      <button class="ck op"   onclick="cOp('÷')">÷</button>

      <button class="ck" onclick="cNum('7')">7</button>
      <button class="ck" onclick="cNum('8')">8</button>
      <button class="ck" onclick="cNum('9')">9</button>
      <button class="ck op" onclick="cOp('×')">×</button>

      <button class="ck" onclick="cNum('4')">4</button>
      <button class="ck" onclick="cNum('5')">5</button>
      <button class="ck" onclick="cNum('6')">6</button>
      <button class="ck op" onclick="cOp('−')">−</button>

      <button class="ck" onclick="cNum('1')">1</button>
      <button class="ck" onclick="cNum('2')">2</button>
      <button class="ck" onclick="cNum('3')">3</button>
      <button class="ck op" onclick="cOp('+')">+</button>

      <button class="ck" onclick="cNum('0')" style="grid-column:span 2">0</button>
      <button class="ck" onclick="cDot()">.</button>
      <button class="ck eq" onclick="cEq()">=</button>
    </div>
    <div class="send-row">
      <button class="send-btn to-usd" onclick="sendTo('usd')">→ ដាក់ជា USD $</button>
      <button class="send-btn to-khr" onclick="sendTo('khr')">→ ដាក់ជា KHR ៛</button>
    </div>
  </div>

</div>

<footer>កែ​អត្រាប្ដូរប្រាក់​ខាង​លើ​បាន​គ្រប់​ពេល · ទិន្នន័យ​គ្រាន់​តែ​សម្រាប់​យោង</footer>

<script>
  const DEFAULT_RATE = 4000;
  let rate = DEFAULT_RATE;

  const usdInput    = document.getElementById('usdInput');
  const khrInput    = document.getElementById('khrInput');
  const rateInput   = document.getElementById('rateInput');
  const formulaEl   = document.getElementById('formula');
  const rateDisplay = document.getElementById('rateDisplay');
  const calcExprEl  = document.getElementById('calcExpr');
  const calcValEl   = document.getElementById('calcVal');

  /* ── Exchange ── */
  function getRate(){ const v=parseFloat(rateInput.value); return(v&&v>0)?v:DEFAULT_RATE; }
  function fmtUSD(n){ return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtKHR(n){ return n.toLocaleString('km-KH',{maximumFractionDigits:0})+'​៛'; }
  function fmtRate(r){ return '1$ = '+r.toLocaleString('en-US')+'​៛'; }

  rateInput.addEventListener('input',()=>{
    rate=getRate(); rateDisplay.textContent=fmtRate(rate);
    if(usdInput.value!=='') calcFromUSD();
    else if(khrInput.value!=='') calcFromKHR();
  });

  const clearFieldsBtn  = document.getElementById('clearFieldsBtn');
  const clearFieldsBtn2 = document.getElementById('clearFieldsBtn2');

  function updateClearBtn(){
    const has = usdInput.value!==''||khrInput.value!=='';
    clearFieldsBtn.classList.toggle('active', has);
    clearFieldsBtn.style.visibility = 'hidden';
    clearFieldsBtn2.classList.toggle('active', has);
  }
  function clearFields(){
    usdInput.value=''; khrInput.value='';
    formulaEl.textContent='បំពេញចំនួនខាងលើ';
    updateClearBtn();
  }

  function calcFromUSD(){
    rate=getRate(); const usd=parseFloat(usdInput.value);
    if(isNaN(usd)||usdInput.value===''){khrInput.value='';formulaEl.textContent='បំពេញចំនួនខាងលើ';updateClearBtn();return;}
    const khr=usd*rate; khrInput.value=Math.round(khr);
    formulaEl.textContent=fmtUSD(usd)+' × '+rate.toLocaleString()+' = '+fmtKHR(khr);
    updateClearBtn();
  }
  function calcFromKHR(){
    rate=getRate(); const khr=parseFloat(khrInput.value);
    if(isNaN(khr)||khrInput.value===''){usdInput.value='';formulaEl.textContent='បំពេញចំនួនខាងលើ';updateClearBtn();return;}
    const usd=khr/rate; usdInput.value=usd.toFixed(2);
    formulaEl.textContent=fmtKHR(khr)+' ÷ '+rate.toLocaleString()+' = '+fmtUSD(usd);
    updateClearBtn();
  }
  function swapValues(){
    rate=getRate(); const u=usdInput.value,k=khrInput.value;
    usdInput.value=''; khrInput.value='';
    if(k!==''){khrInput.value=k;calcFromKHR();}
    else if(u!==''){usdInput.value=u;calcFromUSD();}
    updateClearBtn();
  }
  function resetRate(){
    rateInput.value=DEFAULT_RATE; rate=DEFAULT_RATE; rateDisplay.textContent=fmtRate(DEFAULT_RATE);
    if(usdInput.value!=='') calcFromUSD(); else if(khrInput.value!=='') calcFromKHR();
  }

  /* ── Calculator ── */
  let cCur='0', cPrev=null, cOper=null, cJustEq=false, cExprStr='';

  function fmtCalc(s){
    const n=parseFloat(s); if(isNaN(n)) return s;
    return parseFloat(n.toPrecision(10)).toString();
  }
  function updateScreen(){ calcValEl.textContent=fmtCalc(cCur); calcExprEl.textContent=cExprStr; }

  function cNum(d){
    if(cJustEq){cCur='0';cPrev=null;cOper=null;cExprStr='';cJustEq=false;}
    cCur=(cCur==='0'&&d!=='.')?d:cCur+d;
    updateScreen();
  }
  function cDot(){
    if(cJustEq){cCur='0';cPrev=null;cOper=null;cExprStr='';cJustEq=false;}
    if(!cCur.includes('.')) cCur+='.';
    updateScreen();
  }
  function cOp(op){
    cJustEq=false;
    const cur=parseFloat(cCur);
    if(cOper!==null&&cPrev!==null){
      const res=applyOp(cPrev,cOper,cur);
      cPrev=res; cCur=String(res);
    } else { cPrev=cur; }
    cOper=op; cExprStr=fmtCalc(String(cPrev))+' '+op; cCur='0';
    updateScreen();
  }
  function cEq(){
    if(cOper===null||cPrev===null) return;
    const cur=parseFloat(cCur);
    const res=applyOp(cPrev,cOper,cur);
    cExprStr=fmtCalc(String(cPrev))+' '+cOper+' '+fmtCalc(String(cur))+' =';
    cCur=String(res); cPrev=null; cOper=null; cJustEq=true;
    updateScreen();
  }
  function applyOp(a,op,b){
    if(op==='+') return a+b;
    if(op==='−') return a-b;
    if(op==='×') return a*b;
    if(op==='÷') return b===0?0:a/b;
    if(op==='%') return a*(b/100);
    return b;
  }
  function cAC(){ cCur='0';cPrev=null;cOper=null;cJustEq=false;cExprStr='';updateScreen(); }
  function cBack(){
    if(cJustEq){cAC();return;}
    cCur=cCur.length>1?cCur.slice(0,-1):'0';
    updateScreen();
  }

  function sendTo(field){
    const val=parseFloat(cCur); if(isNaN(val)||val<=0) return;
    if(field==='usd'){ usdInput.value=val.toFixed(2); calcFromUSD(); }
    else { khrInput.value=Math.round(val); calcFromKHR(); }
    updateClearBtn();
    usdInput.scrollIntoView({behavior:'smooth',block:'center'});
  }

  rateDisplay.textContent=fmtRate(DEFAULT_RATE);
  updateScreen();
</script>
</body>
</html>
