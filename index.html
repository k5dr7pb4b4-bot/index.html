<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ម៉ាស៊ីនគិតប្រាក់ | KHR ↔ USD</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --card: #1c2230;
      --border: #2d3748;
      --gold: #e6b84a;
      --gold-dim: #a8822a;
      --teal: #38c9a0;
      --teal-dim: #1f7a60;
      --text: #e8eaf0;
      --muted: #8892a4;
      --danger: #e05252;
      --radius: 14px;
      --mono: 'DM Mono', monospace;
      --khmer: 'Hanuman', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--khmer);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    .flag-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .flag-row span.arrow { color: var(--gold); font-size: 1.4rem; }
    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    h1 em { color: var(--gold); font-style: normal; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 4px; font-family: var(--mono); }

    /* ── Rate Editor ── */
    .rate-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .rate-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-family: var(--mono);
      line-height: 1.6;
    }
    .rate-label strong { display: block; color: var(--gold); font-size: 1.05rem; }
    .rate-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--gold-dim);
      border-radius: 8px;
      padding: 6px 12px;
      flex-shrink: 0;
    }
    .rate-input-wrap input {
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--gold);
      width: 80px;
      text-align: right;
    }
    .rate-input-wrap .unit { color: var(--muted); font-size: 0.8rem; font-family: var(--mono); }
    .rate-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: var(--khmer);
      transition: 0.2s;
    }
    .rate-reset:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Calculator Card ── */
    .calc-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .calc-block {
      padding: 22px 24px;
    }
    .calc-block + .calc-block { border-top: 1px solid var(--border); }

    .block-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-gold { background: var(--gold); }
    .dot-teal { background: var(--teal); }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .currency-badge {
      font-size: 0.9rem;
      font-weight: 700;
      font-family: var(--mono);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      flex-shrink: 0;
    }
    .badge-gold { color: var(--gold); border-color: var(--gold-dim); }
    .badge-teal { color: var(--teal); border-color: var(--teal-dim); }

    .amount-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .amount-input:focus { border-color: var(--gold); }
    .amount-input.teal:focus { border-color: var(--teal); }

    /* ── Swap button ── */
    .swap-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .swap-wrap::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .swap-btn {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: 0.2s;
      color: var(--gold);
    }
    .swap-btn:hover { border-color: var(--gold); background: var(--card); transform: rotate(180deg); }

    /* ── Result ── */
    .result-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
    }
    .result-bar .formula { font-size: 0.75rem; }
    .result-bar .rate-info { color: var(--gold-dim); }

    /* ── Quick amounts ── */
    .quick-wrap {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-label { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); width: 100%; margin-bottom: 4px; }
    .quick-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.8rem;
      font-family: var(--mono);
      cursor: pointer;
      transition: 0.18s;
    }
    .quick-btn:hover { border-color: var(--gold); color: var(--gold); }

    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: var(--mono);
      text-align: center;
    }

    /* ── Clear button ── */
    .clear-wrap {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }
    .clear-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1.5px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      padding: 9px 24px;
      font-family: var(--khmer);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      justify-content: center;
      opacity: 0.5;
      pointer-events: none;
    }
    .clear-btn.active {
      opacity: 1;
      pointer-events: auto;
    }
    .clear-btn.active:hover {
      background: var(--danger);
      color: #fff;
    }

    @media (max-width: 500px) {
      .amount-input { font-size: 1.1rem; padding: 10px 12px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="flag-row">
    🇰🇭 <span class="arrow">⇄</span> 🇺🇸
  </div>
  <h1>ម៉ាស៊ីនប្តូរ<em>រូបិយប័ណ្ណ</em></h1>
  <div class="subtitle">KHR (រៀល) ↔ USD (ដុល្លារ)</div>
</header>

<!-- Rate Editor -->
<div class="rate-card">
  <div class="rate-label">
    <strong>អត្រាប្តូរប្រាក់</strong>
    1 USD = ? KHR (អ្នកអាចកែបាន)
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="rate-input-wrap">
      <input type="number" id="rateInput" value="4000" min="1" max="99999" step="1" />
      <span class="unit">៛</span>
    </div>
    <button class="rate-reset" onclick="resetRate()">លំនាំដើម</button>
  </div>
</div>

<!-- Calculator -->
<div class="calc-card">

  <!-- USD → KHR -->
  <div class="calc-block">
    <div class="block-label">
      <span class="dot dot-gold"></span>
      ពី ដុល្លារ → រៀល
    </div>
    <div class="input-row">
      <span class="currency-badge badge-gold">USD $</span>
      <input class="amount-input" id="usdInput" type="number" min="0" placeholder="0.00" oninput="calcFromUSD()" />
    </div>
  </div>

  <!-- Swap -->
  <div class="swap-wrap">
    <button class="swap-btn" onclick="swapValues()" title="ផ្លាស់ប្ដូរ">⇅</button>
  </div>

  <!-- KHR → USD -->
  <div class="calc-block">
    <div class="block-label">
      <span class="dot dot-teal"></span>
      ពី រៀល → ដុល្លារ
    </div>
    <div class="input-row">
      <span class="currency-badge badge-teal">KHR ៛</span>
      <input class="amount-input teal" id="khrInput" type="number" min="0" placeholder="0" oninput="calcFromKHR()" />
    </div>
  </div>

  <!-- Formula bar -->
  <div class="result-bar">
    <span class="formula" id="formula">បំពេញចំនួនខាងលើ</span>
    <span class="rate-info" id="rateDisplay">1$ = 4,000៛</span>
  </div>

  <!-- Quick amounts -->
  <div class="quick-wrap">
    <div class="quick-label">ចំនួនដុល្លារញញ្ញ $</div>
    <button class="quick-btn" onclick="setUSD(1)">$1</button>
    <button class="quick-btn" onclick="setUSD(5)">$5</button>
    <button class="quick-btn" onclick="setUSD(10)">$10</button>
    <button class="quick-btn" onclick="setUSD(20)">$20</button>
    <button class="quick-btn" onclick="setUSD(50)">$50</button>
    <button class="quick-btn" onclick="setUSD(100)">$100</button>
  </div>

  <div class="quick-wrap" style="border-top:1px solid var(--border); padding-top:10px;">
    <div class="quick-label">ចំនួនរៀលញ្ញ ៛</div>
    <button class="quick-btn" onclick="setKHR(1000)">1,000</button>
    <button class="quick-btn" onclick="setKHR(5000)">5,000</button>
    <button class="quick-btn" onclick="setKHR(10000)">10,000</button>
    <button class="quick-btn" onclick="setKHR(50000)">50,000</button>
    <button class="quick-btn" onclick="setKHR(100000)">100,000</button>
  </div>

  <!-- Clear / Reset amounts -->
  <div class="clear-wrap">
    <button class="clear-btn" id="clearBtn" onclick="clearAmounts()">
      ✕ &nbsp;លុបចំនួនទឹកប្រាក់
    </button>
  </div>

</div>

<footer>
   កែ​អត្រាប្ដូរប្រាក់​ខាង​លើ​បាន​គ្រប់​ពេល · ទិន្នន័យ​គ្រាន់​តែ​សម្រាប់​យោង
</footer>

<script>
  const DEFAULT_RATE = 4000;
  let rate = DEFAULT_RATE;

  const usdInput = document.getElementById('usdInput');
  const khrInput = document.getElementById('khrInput');
  const rateInput = document.getElementById('rateInput');
  const formula = document.getElementById('formula');
  const rateDisplay = document.getElementById('rateDisplay');
  const clearBtn = document.getElementById('clearBtn');

  function updateClearBtn() {
    const hasValue = usdInput.value !== '' || khrInput.value !== '';
    clearBtn.classList.toggle('active', hasValue);
  }

  function clearAmounts() {
    usdInput.value = '';
    khrInput.value = '';
    formula.textContent = 'បំពេញចំនួនខាងលើ';
    updateClearBtn();
    usdInput.focus();
  }

  function getRate() {
    const v = parseFloat(rateInput.value);
    return (v && v > 0) ? v : DEFAULT_RATE;
  }

  function fmtUSD(n) {
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtKHR(n) {
    return n.toLocaleString('km-KH', { maximumFractionDigits: 0 }) + '​៛';
  }
  function fmtRate(r) {
    return '1$ = ' + r.toLocaleString('en-US') + '​៛';
  }

  rateInput.addEventListener('input', () => {
    rate = getRate();
    rateDisplay.textContent = fmtRate(rate);
    if (document.activeElement !== usdInput && usdInput.value !== '') {
      calcFromUSD();
    } else if (khrInput.value !== '') {
      calcFromKHR();
    }
  });

  function calcFromUSD() {
    rate = getRate();
    const usd = parseFloat(usdInput.value);
    if (isNaN(usd) || usdInput.value === '') {
      khrInput.value = '';
      formula.textContent = 'បំពេញចំនួនខាងលើ';
      updateClearBtn();
      return;
    }
    const khr = usd * rate;
    khrInput.value = Math.round(khr);
    formula.textContent = fmtUSD(usd) + ' × ' + rate.toLocaleString() + ' = ' + fmtKHR(khr);
    updateClearBtn();
  }

  function calcFromKHR() {
    rate = getRate();
    const khr = parseFloat(khrInput.value);
    if (isNaN(khr) || khrInput.value === '') {
      usdInput.value = '';
      formula.textContent = 'បំពេញចំនួនខាងលើ';
      updateClearBtn();
      return;
    }
    const usd = khr / rate;
    usdInput.value = usd.toFixed(2);
    formula.textContent = fmtKHR(khr) + ' ÷ ' + rate.toLocaleString() + ' = ' + fmtUSD(usd);
    updateClearBtn();
  }

  function swapValues() {
    rate = getRate();
    const u = usdInput.value;
    const k = khrInput.value;
    usdInput.value = '';
    khrInput.value = '';
    if (k !== '') {
      usdInput.value = '';
      khrInput.value = k;
      calcFromKHR();
    } else if (u !== '') {
      usdInput.value = u;
      calcFromUSD();
    }
  }

  function setUSD(val) {
    usdInput.value = val;
    calcFromUSD();
    updateClearBtn();
    usdInput.focus();
  }

  function setKHR(val) {
    khrInput.value = val;
    calcFromKHR();
    updateClearBtn();
    khrInput.focus();
  }

  function resetRate() {
    rateInput.value = DEFAULT_RATE;
    rate = DEFAULT_RATE;
    rateDisplay.textContent = fmtRate(DEFAULT_RATE);
    if (usdInput.value !== '') calcFromUSD();
    else if (khrInput.value !== '') calcFromKHR();
  }

  // Init display
  rateDisplay.textContent = fmtRate(DEFAULT_RATE);
</script>
</body>
</html>
