<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 បញ្ជីបទចម្រៀង</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #FF0000; --red-dim: #b00000;
      --bg: #0F0F0F; --surface: #1A1A1A; --surface2: #242424; --surface3: #2c2c2c;
      --border: #2e2e2e; --text: #F1F1F1; --muted: #777; --radius: 12px;
      --green: #4CAF50; --orange: #FF9800; --blue: #2196F3;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding-bottom: 80px; }

    /* HEADER */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 30; }
    .logo { background: var(--red); border-radius: 6px; width: 30px; height: 21px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 13px; fill: white; }
    header h1 { font-size: 15px; font-weight: 700; }
    .hdr-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
    .badge { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 3px 9px; border-radius: 20px; }

    /* PLAYER */
    #playerPanel { display: none; background: #000; }
    #playerPanel.active { display: block; }
    #playerWrap { position: relative; width: 100%; padding-top: 56.25%; }
    #ytPlayer { position: absolute; inset: 0; width: 100%; height: 100%; }
    #nowPlayingBar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; gap: 6px; }
    #nowPlayingTitle { flex: 1; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ctrl-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; width: 33px; height: 33px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; transition: color .15s, border-color .15s, background .15s; }
    .ctrl-btn:active { color: var(--text); }
    .ctrl-btn.on { color: var(--green); border-color: var(--green); background: #0a1f0a; }
    .ctrl-btn.sleep-on { color: var(--orange); border-color: var(--orange); background: #1f1200; }
    #sleepCD { font-size: 11px; color: var(--orange); font-weight: 700; display: none; }
    #sleepCD.show { display: block; }

    /* TABS (Playlists) */
    .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 57px; z-index: 20; }
    .tabs-scroll { display: flex; overflow-x: auto; gap: 0; scrollbar-width: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 10px 16px; font-size: 13px; font-weight: 600;
      color: var(--muted); border-bottom: 2.5px solid transparent;
      cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; gap: 6px; transition: color .15s;
      position: relative;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--red); }
    .tab .tab-actions { display: none; gap: 3px; }
    .tab.active .tab-actions { display: flex; }
    .tab-action-btn { background: var(--surface3); border: none; color: var(--muted); border-radius: 5px; width: 20px; height: 20px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .tab-action-btn:active { color: var(--text); background: #444; }
    .tab-add {
      flex-shrink: 0; padding: 10px 14px; font-size: 18px; color: var(--muted);
      cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center;
    }
    .tab-add:active { color: var(--text); }

    /* ADD BOX */
    .add-box { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .add-box label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input, .title-row input { background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; -webkit-appearance: none; transition: border-color .2s; }
    .input-row input { flex: 1; }
    .input-row input:focus, .title-row input:focus { border-color: var(--red); }
    .input-row input::placeholder, .title-row input::placeholder { color: #444; }
    .btn-add { background: var(--red); color: white; border: none; border-radius: 10px; font-size: 20px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
    .btn-add:active { background: var(--red-dim); }
    .title-row { margin-top: 7px; }
    .title-row input { width: 100%; }

    /* SEARCH */
    .filter-bar { padding: 9px 16px; border-bottom: 1px solid var(--border); }
    .filter-wrap { position: relative; }
    .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #444; pointer-events: none; }
    .filter-bar input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13px; padding: 8px 12px 8px 32px; outline: none; }
    .filter-bar input:focus { border-color: var(--red); }
    .filter-bar input::placeholder { color: #444; }

    /* LIST */
    .list { padding: 10px 16px; display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty .big-icon { font-size: 42px; margin-bottom: 10px; }
    .empty p { font-size: 13px; line-height: 1.7; }

    /* CARD */
    .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; align-items: stretch; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color .15s; }
    .card.playing { border-color: var(--red); }
    .card:active { opacity: 0.8; }
    .card-thumb { width: 95px; min-width: 95px; background: #111; position: relative; overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-thumb .ph { width: 100%; height: 66px; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: #333; font-size: 22px; }
    .play-badge { position: absolute; bottom: 4px; right: 4px; background: var(--red); border-radius: 4px; width: 18px; height: 18px; display: none; align-items: center; justify-content: center; }
    .play-badge svg { width: 9px; fill: white; }
    .card.playing .play-badge { display: flex; }
    .card-body { flex: 1; padding: 8px 9px 8px 10px; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
    .card-title { font-size: 12px; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card.playing .card-title { color: #FF6B6B; }
    .card-meta { font-size: 10px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-actions { display: flex; gap: 4px; justify-content: flex-end; margin-top: 6px; flex-wrap: wrap; }
    .btn-sm { background: transparent; border: 1px solid var(--border); color: #555; border-radius: 6px; height: 26px; padding: 0 7px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 3px; -webkit-tap-highlight-color: transparent; white-space: nowrap; }
    .btn-sm:active { background: var(--surface2); color: var(--text); }
    .btn-sm.del:active { background: #2a0000; color: var(--red); border-color: var(--red); }
    .btn-sm.move:active { color: var(--blue); border-color: var(--blue); }

    /* FOOTER */
    .footer-actions { padding: 4px 16px 0; }
    .btn-clear { width: 100%; background: transparent; border: 1px solid var(--border); color: #555; border-radius: 10px; padding: 9px; font-size: 12px; cursor: pointer; }
    .btn-clear:active { border-color: var(--red); color: var(--red); }

    /* TOAST */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px); background: #1e1e1e; border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 16px; font-size: 12px; z-index: 99; opacity: 0; transition: transform .28s cubic-bezier(.34,1.56,.64,1), opacity .28s; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 50; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border-radius: 18px 18px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; transform: translateY(60px); transition: transform .28s cubic-bezier(.34,1.2,.64,1); }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
    .modal input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; }
    .modal input:focus { border-color: var(--red); }
    .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btns button { flex: 1; border: none; border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-confirm { background: var(--red); color: white; }
    .btn-confirm:active { background: var(--red-dim); }
    .btn-cancel { background: var(--surface2); color: var(--muted); }

    /* Move-to-playlist options */
    .pl-options { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; max-height: 240px; overflow-y: auto; }
    .pl-opt { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; -webkit-tap-highlight-color: transparent; transition: border-color .15s; }
    .pl-opt:active, .pl-opt.sel { border-color: var(--blue); color: #64B5F6; }
    .pl-opt .pl-icon { font-size: 18px; }
    .pl-opt .pl-name { font-weight: 600; }
    .pl-opt .pl-count { font-size: 11px; color: var(--muted); margin-left: auto; }

    /* Sleep options */
    .sleep-opts { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
    .sleep-opt { flex: 1; min-width: 65px; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; padding: 11px 4px; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
    .sleep-opt.sel { border-color: var(--orange); color: var(--orange); background: #1f1200; }
  </style>
</head>
<body>

<header>
  <div class="logo"><svg viewBox="0 0 24 24"><path d="M10 15.5l6-3.5-6-3.5v7z"/></svg></div>
  <h1>🎵 បទចម្រៀង</h1>
  <div class="hdr-right">
    <span class="badge" id="countBadge">0 បទ</span>
  </div>
</header>

<!-- Player -->
<div id="playerPanel">
  <div id="playerWrap"><div id="ytPlayer"></div></div>
  <div id="nowPlayingBar">
    <span id="nowPlayingTitle">—</span>
    <button class="ctrl-btn" id="btnShuffle" title="Shuffle">🔀</button>
    <button class="ctrl-btn" id="btnSleep" title="Sleep">😴</button>
    <span id="sleepCD"></span>
    <button class="ctrl-btn" id="btnPrev">&#9664;</button>
    <button class="ctrl-btn" id="btnNext">&#9654;</button>
    <button class="ctrl-btn" id="btnClose">✕</button>
  </div>
</div>

<!-- Playlist Tabs -->
<div class="tabs-wrap">
  <div class="tabs-scroll" id="tabsScroll">
    <!-- tabs rendered here -->
    <div class="tab-add" id="tabAdd" title="បង្កើតប្រអប់ថ្មី">＋</div>
  </div>
</div>

<!-- Add Song -->
<div class="add-box">
  <label>បន្ថែមបទថ្មីទៅ <span id="addToLabel">—</span></label>
  <div class="input-row">
    <input type="url" id="urlInput" placeholder="Paste YouTube link នៅទីនេះ…" autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="btn-add" id="btnAdd">＋</button>
  </div>
  <div class="title-row">
    <input type="text" id="titleInput" placeholder="ឈ្មោះបទ (ស្រេចចិត្ត)" autocomplete="off" />
  </div>
</div>

<!-- Search -->
<div class="filter-bar">
  <div class="filter-wrap">
    <span class="si">🔍</span>
    <input type="search" id="searchInput" placeholder="ស្វែងរកបទ…" />
  </div>
</div>

<div class="list" id="songList"></div>
<div class="footer-actions" id="footerActions" style="display:none">
  <button class="btn-clear" id="btnClearAll">🗑 លុបបទទាំងអស់ក្នុងប្រអប់នេះ</button>
</div>

<div class="toast" id="toast"></div>

<!-- Modal: Create/Rename Playlist -->
<div class="modal-overlay" id="plModal">
  <div class="modal">
    <h3 id="plModalTitle">📁 បង្កើតប្រអប់ថ្មី</h3>
    <input type="text" id="plModalInput" placeholder="ឈ្មោះប្រអប់…" autocomplete="off" />
    <div class="modal-btns">
      <button class="btn-cancel" id="plModalCancel">បោះបង់</button>
      <button class="btn-confirm" id="plModalConfirm">រក្សាទុក</button>
    </div>
  </div>
</div>

<!-- Modal: Rename Song -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>✏️ ប្តូរឈ្មោះបទ</h3>
    <input type="text" id="renameInput" placeholder="ឈ្មោះថ្មី…" autocomplete="off" />
    <div class="modal-btns">
      <button class="btn-cancel" id="renameCancelBtn">បោះបង់</button>
      <button class="btn-confirm" id="renameConfirmBtn">រក្សាទុក</button>
    </div>
  </div>
</div>

<!-- Modal: Move Song to Playlist -->
<div class="modal-overlay" id="moveModal">
  <div class="modal">
    <h3>📂 ផ្ទេរបទទៅប្រអប់</h3>
    <div class="pl-options" id="plOptions"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="moveCancelBtn">បោះបង់</button>
      <button class="btn-confirm" id="moveConfirmBtn">ផ្ទេរ</button>
    </div>
  </div>
</div>

<!-- Modal: Sleep Timer -->
<div class="modal-overlay" id="sleepModal">
  <div class="modal">
    <h3>😴 Sleep Timer</h3>
    <div class="sleep-opts">
      <div class="sleep-opt" data-min="5">5 នាទី</div>
      <div class="sleep-opt" data-min="10">10 នាទី</div>
      <div class="sleep-opt" data-min="15">15 នាទី</div>
      <div class="sleep-opt" data-min="30">30 នាទី</div>
      <div class="sleep-opt" data-min="45">45 នាទី</div>
      <div class="sleep-opt" data-min="60">1 ម៉ោង</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="sleepCancelBtn">បោះបង់</button>
      <button class="btn-confirm" id="sleepOffBtn" style="background:#333;color:#aaa;flex:0.6">បិទ</button>
      <button class="btn-confirm" id="sleepConfirmBtn">ចាប់ផ្តើម</button>
    </div>
  </div>
</div>

<script>
// Load YouTube IFrame API safely
(function(){
  var tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  tag.onerror = function(){ console.warn("YouTube API failed to load - player unavailable"); };
  var first = document.getElementsByTagName("script")[0];
  first.parentNode.insertBefore(tag, first);
})();
</script>
<script>
const KEY = 'yt_app_v3';

// ---- DATA STRUCTURE ----
// { playlists: [{id, name, icon}], songs: [{id, plId, url, title, addedAt}] }
function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY)) || initData(); } catch { return initData(); }
}
function initData() {
  return { playlists: [{ id: 'all', name: 'ទាំងអស់', icon: '🎵' }], songs: [] };
}
function saveData(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

// ---- STATE ----
let activePlId = 'all';
let currentSongId = null;
let ytPlayer = null, ytReady = false, pendingVid = null;
let shuffleOn = false;
let sleepEndTime = null, sleepTick = null, sleepSelMin = null;
let renamingSongId = null;
let movingSongId = null, moveTargetPlId = null;
let plModalMode = null; // 'create' | 'rename'
let renamingPlId = null;

// ---- YOUTUBE ----
function onYouTubeIframeAPIReady() {
  try {
    ytPlayer = new YT.Player('ytPlayer', {
      height: '100%', width: '100%', videoId: '',
      playerVars: { autoplay: 1, rel: 0, playsinline: 1, controls: 1 },
      events: {
        onReady: function() { ytReady = true; if (pendingVid) { ytPlayer.loadVideoById(pendingVid); pendingVid = null; } },
        onStateChange: function(e) { if (e.data === YT.PlayerState.ENDED) navigateSong(1); }
      }
    });
  } catch(err) { console.warn('YouTube player init failed:', err); }
}

function getVid(url) {
  try {
    const u = new URL(url);
    if (u.hostname === 'youtu.be') return u.pathname.slice(1).split('?')[0];
    if (u.hostname.includes('youtube.com')) return u.searchParams.get('v') || u.pathname.split('/').filter(Boolean).pop();
  } catch {}
  return null;
}
function thumb(vid) { return 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('show'); }, 2400);
}

// ---- SONGS IN ACTIVE PLAYLIST ----
function getActiveSongs(data) {
  if (activePlId === 'all') return data.songs;
  return data.songs.filter(function(s){ return s.plId === activePlId; });
}

// ---- PLAY ----
function playSong(id) {
  const d = loadData();
  const song = d.songs.find(function(s){ return s.id === id; });
  if (!song) return;
  const vid = getVid(song.url);
  if (!vid) { toast('⚠️ រកមិនឃើញ Video ID'); return; }
  currentSongId = id;
  document.getElementById('nowPlayingTitle').textContent = song.title;
  document.getElementById('playerPanel').classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  if (ytReady && ytPlayer) ytPlayer.loadVideoById(vid); else pendingVid = vid;
  render();
}

function closePlayer() {
  if (ytPlayer && ytReady) ytPlayer.stopVideo();
  document.getElementById('playerPanel').classList.remove('active');
  currentSongId = null; render();
}

function navigateSong(dir) {
  const d = loadData();
  const songs = getActiveSongs(d);
  if (!songs.length) return;
  if (shuffleOn) {
    const others = songs.filter(function(s){ return s.id !== currentSongId; });
    if (!others.length) return;
    playSong(others[Math.floor(Math.random() * others.length)].id);
    return;
  }
  const idx = songs.findIndex(function(s){ return s.id === currentSongId; });
  let n = idx + dir;
  if (n < 0) n = songs.length - 1;
  if (n >= songs.length) n = 0;
  playSong(songs[n].id);
}

// ---- SHUFFLE ----
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('btnShuffle').classList.toggle('on', shuffleOn);
  toast(shuffleOn ? '🔀 Shuffle បើក' : '🔀 Shuffle បិទ');
}

// ---- SLEEP ----
function openSleepModal() {
  sleepSelMin = null;
  document.querySelectorAll('.sleep-opt').forEach(function(el){ el.classList.remove('sel'); });
  showModal('sleepModal');
}
function startSleep(min) {
  clearInterval(sleepTick);
  sleepEndTime = Date.now() + min * 60000;
  const cd = document.getElementById('sleepCD');
  cd.classList.add('show');
  document.getElementById('btnSleep').classList.add('sleep-on');
  sleepTick = setInterval(function(){
    const rem = sleepEndTime - Date.now();
    if (rem <= 0) {
      clearInterval(sleepTick); cd.classList.remove('show');
      document.getElementById('btnSleep').classList.remove('sleep-on');
      if (ytPlayer && ytReady) ytPlayer.pauseVideo();
      toast('😴 Sleep Timer ឈប់ចំរៀងហើយ'); return;
    }
    const m = Math.floor(rem/60000), s = Math.floor((rem%60000)/1000);
    cd.textContent = m + ':' + (s<10?'0':'') + s;
  }, 1000);
  toast('😴 Sleep Timer ' + min + ' នាទី');
}
function cancelSleep() {
  clearInterval(sleepTick); sleepEndTime = null;
  document.getElementById('sleepCD').classList.remove('show');
  document.getElementById('btnSleep').classList.remove('sleep-on');
  toast('😴 Sleep Timer បិទហើយ');
}

// ---- ADD SONG ----
function addSong() {
  const url = document.getElementById('urlInput').value.trim();
  const title = document.getElementById('titleInput').value.trim();
  if (!url) { toast('⚠️ សូម Paste link YouTube'); return; }
  const vid = getVid(url);
  if (!vid) { toast('⚠️ Link មិនមែន YouTube'); return; }
  const d = loadData();
  if (d.songs.find(function(s){ return s.url === url; })) { toast('⚠️ បទនេះបានរក្សាទុករួចហើយ'); return; }
  const plId = activePlId === 'all' ? null : activePlId;
  d.songs.unshift({ id: uid(), plId: plId, url: url, title: title || ('YouTube · ' + vid), addedAt: new Date().toISOString() });
  saveData(d);
  document.getElementById('urlInput').value = '';
  document.getElementById('titleInput').value = '';
  document.getElementById('searchInput').value = '';
  render(); toast('✅ បានរក្សាទុករួចហើយ!');
}

// ---- DELETE SONG ----
function deleteSong(id, e) {
  e.stopPropagation();
  const d = loadData();
  d.songs = d.songs.filter(function(s){ return s.id !== id; });
  saveData(d);
  if (currentSongId === id) closePlayer();
  render(); toast('🗑 បានលុបហើយ');
}

// ---- RENAME SONG ----
function openRenameSong(id, e) {
  e.stopPropagation();
  renamingSongId = id;
  const d = loadData();
  const song = d.songs.find(function(s){ return s.id === id; });
  if (!song) return;
  document.getElementById('renameInput').value = song.title;
  showModal('renameModal');
  setTimeout(function(){ document.getElementById('renameInput').focus(); }, 300);
}
function confirmRenameSong() {
  const newTitle = document.getElementById('renameInput').value.trim();
  if (!newTitle) { toast('⚠️ សូមបញ្ចូលឈ្មោះ'); return; }
  const d = loadData();
  const song = d.songs.find(function(s){ return s.id === renamingSongId; });
  if (song) { song.title = newTitle; saveData(d); if (currentSongId === renamingSongId) document.getElementById('nowPlayingTitle').textContent = newTitle; render(); toast('✏️ ប្តូរឈ្មោះបានហើយ!'); }
  hideModal('renameModal'); renamingSongId = null;
}

// ---- MOVE SONG ----
function openMoveSong(id, e) {
  e.stopPropagation();
  movingSongId = id;
  const d = loadData();
  const song = d.songs.find(function(s){ return s.id === id; });
  // pre-select current location so confirm works even without re-tapping
  moveTargetPlId = song ? (song.plId || '') : '';
  const opts = d.playlists.filter(function(p){ return p.id !== 'all'; });
  const optHtml = opts.map(function(p){
    const cnt = d.songs.filter(function(s){ return s.plId === p.id; }).length;
    const isSel = song && song.plId === p.id;
    return '<div class="pl-opt' + (isSel?' sel':'') + '" data-plid="' + p.id + '" onclick="selectMovePl(this)">'
      + '<span class="pl-icon">' + p.icon + '</span>'
      + '<span class="pl-name">' + esc(p.name) + '</span>'
      + '<span class="pl-count">' + cnt + ' បទ</span></div>';
  }).join('');
  const isGeneral = song && !song.plId;
  document.getElementById('plOptions').innerHTML =
    '<div class="pl-opt' + (isGeneral?' sel':'') + '" data-plid="" onclick="selectMovePl(this)"><span class="pl-icon">🎵</span><span class="pl-name">ទូទៅ (គ្មានប្រអប់)</span></div>'
    + optHtml;
  showModal('moveModal');
}
function selectMovePl(el) {
  document.querySelectorAll('#plOptions .pl-opt').forEach(function(x){ x.classList.remove('sel'); });
  el.classList.add('sel');
  moveTargetPlId = el.dataset.plid;
}
function confirmMoveSong() {
  if (moveTargetPlId === null) { toast('⚠️ សូមជ្រើសប្រអប់'); return; }
  const d = loadData();
  const song = d.songs.find(function(s){ return s.id === movingSongId; });
  if (song) { song.plId = moveTargetPlId || null; saveData(d); render(); toast('📂 ផ្ទេរបទបានហើយ!'); }
  hideModal('moveModal'); movingSongId = null; moveTargetPlId = null;
}

// ---- PLAYLIST CRUD ----
function openCreatePlaylist() {
  plModalMode = 'create'; renamingPlId = null;
  document.getElementById('plModalTitle').textContent = '📁 បង្កើតប្រអប់ថ្មី';
  document.getElementById('plModalInput').value = '';
  showModal('plModal');
  setTimeout(function(){ document.getElementById('plModalInput').focus(); }, 300);
}
function openRenamePlaylist(plId, e) {
  if (e) e.stopPropagation();
  plModalMode = 'rename'; renamingPlId = plId;
  const d = loadData();
  const pl = d.playlists.find(function(p){ return p.id === plId; });
  if (!pl) return;
  document.getElementById('plModalTitle').textContent = '✏️ ប្តូរឈ្មោះប្រអប់';
  document.getElementById('plModalInput').value = pl.name;
  showModal('plModal');
  setTimeout(function(){ document.getElementById('plModalInput').focus(); }, 300);
}
function confirmPlModal() {
  const name = document.getElementById('plModalInput').value.trim();
  if (!name) { toast('⚠️ សូមបញ្ចូលឈ្មោះ'); return; }
  const d = loadData();
  const icons = ['📁','🎶','⭐','❤️','🔥','🎤','🎸','🎹','🌟','💿'];
  if (plModalMode === 'create') {
    d.playlists.push({ id: uid(), name: name, icon: icons[Math.floor(Math.random()*icons.length)] });
    saveData(d); activePlId = d.playlists[d.playlists.length-1].id;
    toast('📁 បង្កើតប្រអប់ "' + name + '" ហើយ!');
  } else {
    const pl = d.playlists.find(function(p){ return p.id === renamingPlId; });
    if (pl) { pl.name = name; saveData(d); toast('✏️ ប្តូរឈ្មោះប្រអប់ហើយ!'); }
  }
  hideModal('plModal'); render();
}
function deletePlaylist(plId, e) {
  if (e) e.stopPropagation();
  const d = loadData();
  const pl = d.playlists.find(function(p){ return p.id === plId; });
  if (!pl) return;
  if (!confirm('លុបប្រអប់ "' + pl.name + '"?\n(បទក្នុងប្រអប់នឹងត្រូវទៅ "ទូទៅ")')) return;
  // move songs to general
  d.songs.forEach(function(s){ if (s.plId === plId) s.plId = null; });
  d.playlists = d.playlists.filter(function(p){ return p.id !== plId; });
  saveData(d);
  if (activePlId === plId) activePlId = 'all';
  render(); toast('🗑 លុបប្រអប់ហើយ');
}

// ---- MODAL HELPERS ----
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

// ---- RENDER ----
function render() {
  const d = loadData();
  const filter = document.getElementById('searchInput').value || '';

  // --- Tabs ---
  const tabsScroll = document.getElementById('tabsScroll');
  const tabAdd = document.getElementById('tabAdd');
  // remove existing tabs (keep tabAdd)
  Array.from(tabsScroll.querySelectorAll('.tab')).forEach(function(t){ t.remove(); });
  d.playlists.forEach(function(pl) {
    const isActive = pl.id === activePlId;
    const cnt = pl.id === 'all' ? d.songs.length : d.songs.filter(function(s){ return s.plId === pl.id; }).length;
    const tab = document.createElement('div');
    tab.className = 'tab' + (isActive ? ' active' : '');
    tab.dataset.plid = pl.id;
    tab.innerHTML = '<span>' + pl.icon + ' ' + esc(pl.name) + '</span>'
      + '<span style="color:var(--muted);font-size:10px;font-weight:400">(' + cnt + ')</span>'
      + (pl.id !== 'all'
        ? '<div class="tab-actions">'
          + '<button class="tab-action-btn" onclick="openRenamePlaylist(\'' + pl.id + '\',event)" title="ប្តូរឈ្មោះ">✏️</button>'
          + '<button class="tab-action-btn" onclick="deletePlaylist(\'' + pl.id + '\',event)" title="លុប">🗑</button>'
          + '</div>'
        : '');
    tab.addEventListener('click', function(e) {
      if (e.target.closest('.tab-actions')) return;
      activePlId = pl.id; render();
    });
    tabsScroll.insertBefore(tab, tabAdd);
  });

  // --- Add-to label ---
  const activePl = d.playlists.find(function(p){ return p.id === activePlId; });
  document.getElementById('addToLabel').textContent = activePl ? (activePl.icon + ' ' + activePl.name) : '—';

  // --- Song list ---
  const songs = getActiveSongs(d);
  const filtered = filter ? songs.filter(function(s){ return s.title.toLowerCase().includes(filter.toLowerCase()); }) : songs;
  const list = document.getElementById('songList');
  document.getElementById('countBadge').textContent = d.songs.length + ' បទ';
  document.getElementById('footerActions').style.display = songs.length ? 'block' : 'none';

  if (!filtered.length) {
    list.innerHTML = songs.length === 0
      ? '<div class="empty"><div class="big-icon">' + (activePl ? activePl.icon : '🎵') + '</div><p>'
        + (activePlId === 'all' ? 'មិនទាន់មានបទ<br>Paste link YouTube ខាងលើ' : 'ប្រអប់ "' + esc(activePl ? activePl.name : '') + '" ទទេ<br>Paste link YouTube ខាងលើ ឬផ្ទេរបទចូល')
        + '</p></div>'
      : '<div class="empty"><div class="big-icon">🔍</div><p>រកមិនឃើញបទ</p></div>';
    return;
  }

  list.innerHTML = filtered.map(function(song) {
    const vid = getVid(song.url);
    const isPlaying = song.id === currentSongId;
    const imgHtml = vid ? '<img src="' + thumb(vid) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'" />' : '<div class="ph">▶</div>';
    // show which playlist the song belongs to (in "all" view)
    let plLabel = '';
    if (activePlId === 'all' && song.plId) {
      const sp = d.playlists.find(function(p){ return p.id === song.plId; });
      if (sp) plLabel = sp.icon + ' ' + sp.name;
    }
    return '<div class="card' + (isPlaying ? ' playing' : '') + '" onclick="playSong(\'' + song.id + '\')">'
      + '<div class="card-thumb">' + imgHtml + '<div class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'
      + '<div class="card-body">'
      + '<div class="card-title">' + esc(song.title) + '</div>'
      + (plLabel ? '<div class="card-meta" style="color:#64B5F6">' + esc(plLabel) + '</div>' : '')
      + '<div class="card-meta">' + esc(song.url.length>36 ? song.url.slice(0,36)+'…' : song.url) + '</div>'
      + '<div class="card-actions">'
      + '<button class="btn-sm move" onclick="openMoveSong(\'' + song.id + '\',event)">📂 ផ្ទេរ</button>'
      + '<button class="btn-sm" onclick="openRenameSong(\'' + song.id + '\',event)">✏️</button>'
      + '<button class="btn-sm del" onclick="deleteSong(\'' + song.id + '\',event)">🗑</button>'
      + '</div></div></div>';
  }).join('');
}

// ---- EVENTS ----
document.getElementById('btnAdd').addEventListener('click', addSong);
document.getElementById('btnClose').addEventListener('click', closePlayer);
document.getElementById('btnPrev').addEventListener('click', function(){ navigateSong(-1); });
document.getElementById('btnNext').addEventListener('click', function(){ navigateSong(1); });
document.getElementById('btnShuffle').addEventListener('click', toggleShuffle);
document.getElementById('btnSleep').addEventListener('click', openSleepModal);
document.getElementById('tabAdd').addEventListener('click', openCreatePlaylist);

document.getElementById('urlInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addSong(); });
document.getElementById('titleInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addSong(); });
document.getElementById('renameInput').addEventListener('keydown', function(e){ if(e.key==='Enter') confirmRenameSong(); });
document.getElementById('plModalInput').addEventListener('keydown', function(e){ if(e.key==='Enter') confirmPlModal(); });
document.getElementById('searchInput').addEventListener('input', function(e){ render(); });

// Playlist modal
document.getElementById('plModalConfirm').addEventListener('click', confirmPlModal);
document.getElementById('plModalCancel').addEventListener('click', function(){ hideModal('plModal'); });
document.getElementById('plModal').addEventListener('click', function(e){ if(e.target===this) hideModal('plModal'); });

// Rename song modal
document.getElementById('renameConfirmBtn').addEventListener('click', confirmRenameSong);
document.getElementById('renameCancelBtn').addEventListener('click', function(){ hideModal('renameModal'); renamingSongId=null; });
document.getElementById('renameModal').addEventListener('click', function(e){ if(e.target===this){ hideModal('renameModal'); renamingSongId=null; } });

// Move modal
document.getElementById('moveConfirmBtn').addEventListener('click', confirmMoveSong);
document.getElementById('moveCancelBtn').addEventListener('click', function(){ hideModal('moveModal'); movingSongId=null; });
document.getElementById('moveModal').addEventListener('click', function(e){ if(e.target===this){ hideModal('moveModal'); movingSongId=null; } });

// Sleep modal
document.querySelectorAll('.sleep-opt').forEach(function(el){
  el.addEventListener('click', function(){
    document.querySelectorAll('.sleep-opt').forEach(function(x){ x.classList.remove('sel'); });
    el.classList.add('sel'); sleepSelMin = parseInt(el.dataset.min);
  });
});
document.getElementById('sleepConfirmBtn').addEventListener('click', function(){
  if (!sleepSelMin) { toast('⚠️ សូមជ្រើសពេលវេលា'); return; }
  startSleep(sleepSelMin); hideModal('sleepModal');
});
document.getElementById('sleepOffBtn').addEventListener('click', function(){ cancelSleep(); hideModal('sleepModal'); });
document.getElementById('sleepCancelBtn').addEventListener('click', function(){ hideModal('sleepModal'); });
document.getElementById('sleepModal').addEventListener('click', function(e){ if(e.target===this) hideModal('sleepModal'); });

// Clear current playlist songs
document.getElementById('btnClearAll').addEventListener('click', function(){
  const d = loadData();
  const pl = d.playlists.find(function(p){ return p.id === activePlId; });
  const label = pl ? pl.name : 'ទាំងអស់';
  if (!confirm('លុបបទទាំងអស់ក្នុង "' + label + '"?')) return;
  if (activePlId === 'all') { d.songs = []; } else { d.songs = d.songs.filter(function(s){ return s.plId !== activePlId; }); }
  saveData(d); closePlayer(); render(); toast('🗑 បានលុបទាំងអស់');
});

// Auto paste
document.addEventListener('paste', function(e){
  const inputs = ['urlInput','titleInput','searchInput','renameInput','plModalInput'].map(function(id){ return document.getElementById(id); });
  if (inputs.indexOf(document.activeElement) !== -1) return;
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (text && (text.includes('youtube.com') || text.includes('youtu.be'))) {
    document.getElementById('urlInput').value = text;
    document.getElementById('urlInput').focus();
    toast('📋 Link YouTube បានបញ្ចូល!');
  }
});

render();
</script>
</body>
</html>
